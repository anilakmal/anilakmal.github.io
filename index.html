<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sugho Sports</title>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#0f172a;
    color:white;
}

/* HEADER */

header{
    position:fixed;
    width:100%;
    top:0;
    z-index:1000;
    background:rgba(0,0,0,0.5);
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 8%;
}

.logo{
    font-size:28px;
    font-weight:700;
    color:#38bdf8;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    font-weight:500;
    transition:0.3s;
}

nav a:hover{
    color:#38bdf8;
}

/* HERO */

.hero{
    height:100vh;
    background:
    linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.7)),
    url('https://images.pexels.com/photos/274422/pexels-photo-274422.jpeg');
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
}

.hero-content h1{
    font-size:65px;
    margin-bottom:20px;
}

.hero-content p{
    font-size:22px;
    margin-bottom:30px;
    color:#ddd;
}

.btn{
    padding:14px 35px;
    border:none;
    background:#38bdf8;
    color:white;
    font-size:16px;
    border-radius:50px;
    cursor:pointer;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
    background:#0ea5e9;
}

/* FEATURES */

.features{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
    padding:80px 8%;
    background:#111827;
}

.feature-box{
    background:rgba(255,255,255,0.05);
    padding:35px;
    border-radius:20px;
    backdrop-filter:blur(8px);
    transition:0.3s;
}

.feature-box:hover{
    transform:translateY(-10px);
}

.feature-box h3{
    margin-bottom:15px;
    color:#38bdf8;
}

/* PRODUCTS */

.products-section{
    padding:90px 8%;
}

.section-title{
    text-align:center;
    margin-bottom:50px;
}
